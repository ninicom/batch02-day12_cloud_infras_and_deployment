name: Continuous Deployment (CD)

on:
  workflow_run:
    workflows: ["Continuous Integration (CI)"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only run deploy if the CI workflow was completely successful
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
    - name: Trigger Render Deploy Hook
      env:
        DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      run: |
        echo "CI passed successfully. Initiating Deployment to Production..."
        if [ ! -z "$DEPLOY_HOOK" ]; then
          curl -X POST $DEPLOY_HOOK
          echo "Deploy triggered successfully to Render!"
        else
          echo "RENDER_DEPLOY_HOOK_URL secret is not set."
          echo "If Render is connected to this repo, it will auto-deploy anyway."
        fi
