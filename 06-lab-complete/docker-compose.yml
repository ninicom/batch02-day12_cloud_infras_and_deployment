version: "3.9"

services:
  agent:
    build: .
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
      - PORT=8000
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - agent_net
    deploy:
      replicas: 3

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - agent_net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - agent
    networks:
      - agent_net

networks:
  agent_net:
    driver: bridge
